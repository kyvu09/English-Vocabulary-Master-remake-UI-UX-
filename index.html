<!DOCTYPE html>
<html lang="vi" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Vocabulary Master</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/bootstrap-theme.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#dashboard" class="sidebar-logo">
          
          <span>EV Master</span>
        </a>
        <button class="sidebar-close-btn" id="sidebarCloseBtn" type="button" aria-label="Đóng menu">
          <i data-lucide="x"></i>
        </button>
      </div>

      <div class="sidebar-nav">
        <button class="nav-item active" type="button" data-page="dashboard">
          <span class="nav-icon"><i data-lucide="home"></i></span>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" type="button" data-page="vocabulary">
          <span class="nav-icon"><i data-lucide="book-open"></i></span>
          <span>Từ vựng</span>
        </button>
        <button class="nav-item" type="button" data-page="sessions">
          <span class="nav-icon"><i data-lucide="target"></i></span>
          <span>Buổi học</span>
        </button>
        <button class="nav-item" type="button" data-page="practice">
          <span class="nav-icon"><i data-lucide="pen-tool"></i></span>
          <span>Luyện tập</span>
        </button>
        <button class="nav-item" type="button" data-page="results">
          <span class="nav-icon"><i data-lucide="bar-chart-2"></i></span>
          <span>Kết quả</span>
        </button>
        <button class="nav-item" type="button" data-page="leaderboard">
          <span class="nav-icon"><i data-lucide="award"></i></span>
          <span>Xếp Hạng</span>
        </button>
        <button class="nav-item" type="button" data-page="themes">
          <span class="nav-icon" id="themeIcon"><i data-lucide="sun"></i></span>
          <span style="flex:1">Chủ đề</span>
          <span class="theme-switch" id="themeSwitch">
            <span class="theme-switch-slider" id="themeSlider"></span>
          </span>
        </button>
      </div>

      <div class="sidebar-footer">
        <button class="user-profile" id="userProfile" type="button" aria-label="Quản lý tài khoản">
          <div class="user-avatar" id="userAvatar">
            <img id="userAvatarImage" alt="Ảnh đại diện" hidden />
            <span id="userInitial">U</span>
          </div>
          <div class="user-meta">
            <div class="user-name" id="userName">Đang tải...</div>
            <div class="user-email" id="userEmail">...</div>
          </div>
          <span class="user-profile-arrow">
            <i data-lucide="chevron-right" width="16" height="16"></i>
          </span>
        </button>
      </div>
    </nav>

    <header class="navbar">
      <div class="navbar-left">
        <button class="hamburger-btn navbar-menu-btn" id="hamburgerBtn" type="button" aria-label="Mở menu">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </button>
        <h1 class="navbar-title" id="pageTitle">Dashboard</h1>
      </div>

      <div class="navbar-right"></div>
    </header>

    <main class="app-content">
      <div id="pageContent" class="page"></div>
    </main>

    <div class="tab-bar">
      <div class="tab-bar-items">
        <button class="tab-bar-item active" type="button" data-page="dashboard">
          <span class="tab-bar-icon"><i data-lucide="home"></i></span>
          <span>Dashboard</span>
        </button>
        <button class="tab-bar-item" type="button" data-page="vocabulary">
          <span class="tab-bar-icon"><i data-lucide="book-open"></i></span>
          <span>Từ vựng</span>
        </button>
        <button class="tab-bar-item" type="button" data-page="sessions">
          <span class="tab-bar-icon"><i data-lucide="target"></i></span>
          <span>Buổi học</span>
        </button>
        <button class="tab-bar-item" type="button" data-page="practice">
          <span class="tab-bar-icon"><i data-lucide="pen-tool"></i></span>
          <span>Luyện tập</span>
        </button>
        <button class="tab-bar-item" type="button" data-page="results">
          <span class="tab-bar-icon"><i data-lucide="bar-chart-2"></i></span>
          <span>Kết quả</span>
        </button>
      </div>
    </div>
  </div>

  <div id="sidebarOverlay" class="sidebar-overlay"></div>

  <!-- Bootstrap Toast Container -->
  <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1060;" id="toastContainer"></div>

  <div id="accountModal" class="modal fade" aria-hidden="true" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content p-0 border-0 shadow" style="border-radius: var(--radius);">
        <div class="p-4">
          <div class="d-flex align-items-start justify-content-between gap-3 mb-4">
            <div>
              <h2 class="modal-title fs-4 fw-bold m-0">Quản lý tài khoản</h2>
              <p class="text-muted small mt-1 mb-0">thông tin hồ sơ</p>
            </div>
            <button class="btn-close" id="accountModalCloseBtn" type="button" aria-label="Đóng"></button>
          </div>

          <div class="d-flex align-items-center gap-3 p-3 rounded-4 mb-4" style="background: var(--primary-soft);">
            <div class="user-avatar account-avatar-preview" id="accountAvatar" style="width:68px;height:68px;font-size:1.5rem;">
              <img id="accountAvatarImage" alt="Xem trước ảnh đại diện" hidden />
              <span id="accountAvatarInitial">U</span>
            </div>
            <div>
              <div class="fw-bold" id="accountModalHeading">Hồ sơ của bạn</div>
            </div>
          </div>

          <form id="accountForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold" for="accountDisplayName">Tên hiển thị</label>
                <input id="accountDisplayName" class="form-control" type="text" placeholder="Ví dụ: Nguyễn Văn A" />
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold" for="accountEmail">Email</label>
                <input id="accountEmail" class="form-control" type="email" readonly />
              </div>
            </div>

            <div class="mt-3">
              <label class="form-label fw-semibold" for="accountPhotoUrl">Link ảnh đại diện</label>
              <input id="accountPhotoUrl" class="form-control" type="url" placeholder="https://example.com/avatar.jpg" />
              <div class="form-text">Dùng URL ảnh công khai. Để trống nếu muốn quay về avatar chữ cái.</div>
            </div>

            <div class="d-flex flex-wrap gap-3 mt-4">
              <button class="btn btn-primary" id="accountSaveBtn" type="submit">Lưu thay đổi</button>
              <button class="btn btn-outline-primary" id="accountResetPasswordBtn" type="button">Gửi email đổi mật khẩu</button>
            </div>

            <div id="accountStatus" class="status" aria-live="polite"></div>
          </form>

          <hr class="my-4">

          <button class="account-logout-btn w-100" id="logoutBtn" type="button">
            <i data-lucide="log-out" width="20" height="20"></i>
            <span class="ms-2">Đăng xuất</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="env-config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      if (window.lucide) {
        lucide.createIcons();
      }
    });
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
